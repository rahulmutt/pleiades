# Manual-release fallback (cargo-release). The default release path is now
# release-plz (see .github/workflows/release-plz.yml and release-plz.toml).
# Use this only to cut a release by hand, e.g. `cargo release <version> --execute`.
allow-branch = ["main"]
shared-version = true
consolidate-commits = true
dependent-version = "fix"
pre-release-commit-message = "Release {{version}}"
tag-name = "v{{version}}"
tag-message = "Release {{version}}"
sign-commit = false
sign-tag = false
publish = true
push = true
tag = true
