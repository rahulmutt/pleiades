[tools]
rust = { version = "1.95.0", components = "clippy,rustfmt" }

[tasks.fmt]
run = "cargo fmt --all --check"

[tasks.lint]
run = "cargo clippy --workspace --all-targets --all-features -- -D warnings"

[tasks.test]
run = "cargo test --workspace"

[tasks.audit]
run = "cargo run -q -p pleiades-validate -- workspace-audit"

[tasks.release-smoke]
run = """
tmpdir=$(mktemp -d)
trap 'rm -rf "$tmpdir"' EXIT
cargo run -q -p pleiades-validate -- workspace-audit >/dev/null
cargo run -q -p pleiades-validate -- verify-compatibility-profile >/dev/null
cargo run -q -p pleiades-validate -- validate-artifact >/dev/null
cargo run -q -p pleiades-validate -- bundle-release --out "$tmpdir" --rounds 1 >/dev/null
cargo run -q -p pleiades-validate -- verify-release-bundle --out "$tmpdir" >/dev/null
test -s "$tmpdir/compatibility-profile.txt"
test -s "$tmpdir/validation-report.txt"
test -s "$tmpdir/bundle-manifest.txt"
"""

[tasks.ci]
depends = ["fmt", "lint", "test", "audit", "release-smoke"]
