[env]
# Single source of truth for the dated fuzzing nightly, consumed by the
# `fuzz`/`fuzz-target` tasks below (`cargo "+$FUZZ_NIGHTLY"`). The array
# pin form under `[tools] rust` (`rust = [{...}, "nightly-..."]`) was tried
# here first, but `workspace-audit`'s `[tools]` parser requires `rust =` to
# be a single inline table (main's shape) — an array trips
# `tool-manifest.rust-entry-invalid`/`rust-components-missing`, which is a
# real reproducibility rule (it also verifies the pinned version matches
# `[workspace.package] rust-version` and that rustfmt+clippy are present),
# not something to special-case away for this file. So `[tools] rust` below
# stays byte-identical to main, and `[env] FUZZ_NIGHTLY` above is what the
# mise `fuzz`/`fuzz-target` tasks and CI actually consume; CI installs it
# explicitly (see .github/workflows/fuzz.yml). `fuzz/rust-toolchain.toml`
# mirrors the same date for direct/IDE invocations outside mise (e.g. a bare
# `cd fuzz && cargo fuzz run`), but provisions nothing the pipeline uses.
# That file must repeat the same date string — mise's Tera templating can't
# reach into a file rustup reads directly — so it carries a comment pointing
# back here; keep both dates identical on a bump.
FUZZ_NIGHTLY = "nightly-2026-07-01"

[tools]
rust = { version = "1.97.1", components = "rustfmt,clippy" }
"cargo:cargo-fuzz" = "0.12.0"
# Mutation testing (report-only, weekly tier — see .github/workflows/mutants.yml).
# Source build: no aqua/prebuilt backend for cargo-mutants, compiled once then
# served from the mise cache. Runs on the pinned STABLE toolchain — unlike
# cargo-fuzz it needs no nightly, so it adds no toolchain surface.
"cargo:cargo-mutants" = "27.1.0"
# Manual-only release fallback (see release.toml); no prebuilt binary for 1.1.3,
# so it stays a source build — compiled once, then served from the mise cache.
"cargo:cargo-release" = "1.1.3"
# Prebuilt-binary backends (aqua = checksum-verified) so `mise install` downloads
# instead of compiling from source — keeps blocking CI inside its wall-clock budget.
"aqua:orhun/git-cliff" = "2.13.1"
"aqua:release-plz/release-plz" = "0.3.160"
"aqua:EmbarkStudios/cargo-deny" = "0.20.2"
gitleaks = "8.30.1"
# nextest is a monorepo publishing several tag prefixes (cargo-nextest-*,
# nextest-runner-*, …); no aqua registry entry. The github backend fetches the
# prebuilt `cargo-nextest` binary and verifies its GitHub artifact attestation.
# Pin the full tag as the version so mise resolves within the cargo-nextest-*
# series (ubi mis-resolved "latest" across the mixed prefixes and is deprecated).
"github:nextest-rs/nextest" = { version = "cargo-nextest-0.9.140", exe = "cargo-nextest" }

[tasks.fmt]
run = "cargo fmt --all --check"

[tasks.lint]
run = "cargo clippy --workspace --all-targets --all-features -- -D warnings"

[tasks.test]
# Blocking fast suite: exclude pleiades-validate — its ~50 heavy release-validation
# / numeric-gate tests (30s–280s each) dominate wall-clock and belong to the nightly
# tier. They still run in full via `test-full` (nightly) → reachable from release-gate,
# so nothing goes unvalidated at release time.
run = "cargo nextest run --workspace -E 'not package(pleiades-validate)'"

[tasks.doctest]
run = "cargo test --doc --workspace"

[tasks.test-full]
depends = ["doctest"]
run = "cargo nextest run --workspace --run-ignored all"

[tasks.docs]
run = "RUSTDOCFLAGS=\"-D warnings\" cargo doc --workspace --no-deps --all-features"

[tasks.audit]
run = "cargo run -q -p pleiades-validate -- workspace-audit"

[tasks.deny]
run = "cargo deny check"

[tasks.secrets]
run = "gitleaks git ."

[tasks.package-check]
shell = "bash -c"
run = '''
set -euo pipefail
crates="pleiades-types pleiades-apparent pleiades-eclipse pleiades-time pleiades-backend pleiades-apsides pleiades-compression pleiades-houses pleiades-ayanamsa pleiades-vsop87 pleiades-elp pleiades-jpl pleiades-data pleiades-core"
version=$(sed -n 's/^version = "\(.*\)"$/\1/p' Cargo.toml | head -n 1)
[ -n "$version" ] || { echo "package-check: could not extract workspace version from Cargo.toml" >&2; exit 1; }
budget_bytes=$((9 * 1024 * 1024))
# Package all publishable crates together so cargo can resolve intra-workspace
# path dependencies without hitting crates.io (required before first publish).
pkg_args=""
for crate in $crates; do
  pkg_args="$pkg_args --package $crate"
done
cargo package --quiet --no-verify --allow-dirty $pkg_args
for crate in $crates; do
  artifact="target/package/${crate}-${version}.crate"
  size=$(wc -c < "$artifact")
  if [ "$size" -gt "$budget_bytes" ]; then
    echo "package-check: $artifact is $size bytes, over the $budget_bytes-byte budget" >&2
    exit 1
  fi
  echo "package-check: $artifact ok ($size bytes)"
done
'''

[tasks.claims-audit]
description = "Run fast claim audit (drift + structural). Pass --full to also run the slow accuracy audit."
run = "cargo run -q -p pleiades-validate -- claims-audit"

[tasks.benchmark]
run = "cargo run -q -p pleiades-validate -- benchmark --rounds 5"

[tasks.fuzz]
description = "Run all fuzz targets for a short budget (local smoke; NOT part of ci or ci-nightly)."
run = """
set -euo pipefail
for target in spk_kernel compression_framing compression_payload ingest_corpus; do
  echo "── fuzzing $target ──"
  cargo "+$FUZZ_NIGHTLY" fuzz run "$target" -- -max_total_time=60
done
"""

[tasks.fuzz-target]
description = "Run one fuzz target for an explicit budget: mise run fuzz-target <name> <seconds>."
run = "cargo \"+$FUZZ_NIGHTLY\" fuzz run {{arg(name=\"target\")}} -- -max_total_time={{arg(name=\"seconds\")}}"

[tasks.mutants]
description = "Mutation testing baseline over the pure-logic crates (report-only; NOT part of ci or ci-nightly)."
# --test-workspace=false is load-bearing, not an optimization: cargo-mutants runs
# the ENTIRE workspace suite per mutant by default, and pleiades-validate /
# pleiades-cli carry individual tests of 300+ seconds (see
# docs/superpowers/plans/test-timings.md). Without this flag one mutant costs
# minutes and 1451 of them are unschedulable at any cadence. Restricting to the
# mutated package's own tests is also the semantically correct scope.
# Exit code 2 (surviving mutants found) is an EXPECTED result here, not an error
# — this tier is report-only. See .github/workflows/mutants.yml for the mapping.
run = """
cargo mutants \
  --test-tool nextest \
  --test-workspace=false \
  --baseline auto \
  -p pleiades-types \
  -p pleiades-time \
  -p pleiades-apparent
"""

[tasks.mutants-crate]
description = "Mutation testing for one crate: mise run mutants-crate <name>."
run = "cargo mutants --test-tool nextest --test-workspace=false --baseline auto -p {{arg(name=\"crate\")}}"

[tasks.release-smoke]
run = "cargo run -q -p pleiades-validate -- release-smoke"

[tasks.release-gate]
depends = ["fmt", "lint", "test-full", "benchmark", "audit", "package-check", "release-smoke", "claims-audit"]
run = "cargo run -q -p pleiades-validate -- release-gate"

[tasks.ci]
depends = ["fmt", "lint", "docs", "audit", "deny", "secrets", "claims-audit", "test", "doctest", "release-smoke"]

[tasks.ci-nightly]
description = "Nightly tier: slow/broad checks (fail-loud, not fail-blocking)."
depends = ["test-full", "package-check", "benchmark", "deny", "secrets"]

[tasks.gate-houses]
run = "cargo run -q -p pleiades-validate -- validate-houses"

[tasks.gate-ayanamsa]
run = "cargo run -q -p pleiades-validate -- validate-ayanamsa"

[tasks.gate-apparent]
run = "cargo run -q -p pleiades-validate -- validate-apparent"

[tasks.gate-topocentric]
run = "cargo run -q -p pleiades-validate -- validate-topocentric"

[tasks.gate-corpus]
run = "cargo run -q -p pleiades-validate -- validate-corpus"

[tasks.compat-claims-audit]
run = "cargo run -q -p pleiades-validate -- compat-claims-audit"
