[tools]
rust = { version = "1.95.0", components = "clippy,rustfmt" }

[tasks.fmt]
run = "cargo fmt --all --check"

[tasks.lint]
run = "cargo clippy --workspace --all-targets --all-features -- -D warnings"

[tasks.test]
run = "cargo test --workspace"

[tasks.docs]
run = "RUSTDOCFLAGS=\"-D warnings\" cargo doc --workspace --no-deps --all-features"

[tasks.audit]
run = "cargo run -q -p pleiades-validate -- workspace-audit"

[tasks.release-smoke]
run = "cargo run -q -p pleiades-validate -- release-smoke"

[tasks.ci]
depends = ["fmt", "lint", "test", "docs", "audit", "release-smoke"]
