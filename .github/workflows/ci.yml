name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install mise-managed tools
        uses: jdx/mise-action@v2
        with:
          install: true

      - name: Run workspace checks
        run: mise run ci
