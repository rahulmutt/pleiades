name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20 # blocking-CI budget: target <=10 min; hard cap raised to 20 for cold-cache / runner-variance headroom (real runs land ~10-13 min)
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # gitleaks (mise run secrets) scans full history

      - name: Set up mise
        uses: jdx/mise-action@v2
        with:
          install: false

      - name: Cache Rust toolchain, Cargo, and mise tools
        uses: actions/cache@v4
        with:
          path: |
            ~/.rustup
            ~/.cargo
            ~/.local/share/mise # mise-installed tool binaries: avoids recompiling cargo: tools each run
            target # compiled workspace artifacts: avoids a full cold rebuild each run
          key: ${{ runner.os }}-rust-${{ hashFiles('mise.toml', 'Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-rust-

      - name: Install mise-managed tools
        run: mise install

      - name: Run workspace checks
        run: mise run ci
