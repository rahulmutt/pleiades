[workspace]
# Reuse the same changelog format as the 0.3.0 bootstrap.
changelog_config = "cliff.toml"
# Funnel all unified-version crates into the single curated root changelog
# instead of release-plz's default per-crate CHANGELOG.md files.
changelog_path = "CHANGELOG.md"
# Create GitHub Releases for each tag.
git_release_enable = true
# Don't churn Cargo.lock as part of the release commit.
dependencies_update = false

# Unified versioning: every publishable crate shares one version_group, so the
# whole workspace bumps lock-step (matching version.workspace inheritance and the
# retired release.toml shared-version behavior). The 2 publish=false crates are
# skipped automatically and need no entry.
[[package]]
name = "pleiades-types"
version_group = "pleiades"

[[package]]
name = "pleiades-apparent"
version_group = "pleiades"

[[package]]
name = "pleiades-apsides"
version_group = "pleiades"

[[package]]
name = "pleiades-time"
version_group = "pleiades"

[[package]]
name = "pleiades-backend"
version_group = "pleiades"

[[package]]
name = "pleiades-compression"
version_group = "pleiades"

[[package]]
name = "pleiades-houses"
version_group = "pleiades"

[[package]]
name = "pleiades-ayanamsa"
version_group = "pleiades"

